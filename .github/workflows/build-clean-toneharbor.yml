name: Build ToneHarbor Clean APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Find single ToneHarbor package
        run: |
          ls -la
          ZIP_COUNT=$(ls ToneHarbor*.zip 2>/dev/null | wc -l)
          if [ "$ZIP_COUNT" -ne 1 ]; then
            echo "Expected exactly one ToneHarbor ZIP, found $ZIP_COUNT."
            ls -la ToneHarbor*.zip || true
            exit 1
          fi
          ZIP_FILE=$(ls ToneHarbor*.zip | head -n 1)
          echo "ZIP_FILE=$ZIP_FILE" >> $GITHUB_ENV
          echo "Using package: $ZIP_FILE"

      - name: Unzip ToneHarbor package
        run: |
          rm -rf extracted
          unzip "$ZIP_FILE" -d extracted
          echo "Extracted project preview:"
          find extracted -maxdepth 4 -type f | sort

      - name: Locate Android project
        run: |
          PROJECT_DIR=$(find extracted -name settings.gradle -exec dirname {} \; | head -n 1)
          if [ -z "$PROJECT_DIR" ]; then
            echo "No Android project found."
            exit 1
          fi
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "Android project found at: $PROJECT_DIR"

      - name: Locate active Android app source
        run: |
          APP_SOURCE=$(find extracted -path "*/app/src/main" -type d | head -n 1)
          if [ -z "$APP_SOURCE" ]; then
            echo "No active Android app source found."
            exit 1
          fi
          echo "APP_SOURCE=$APP_SOURCE" >> $GITHUB_ENV
          echo "Active app source found at: $APP_SOURCE"

      - name: Reject old contaminated active app wording only
        run: |
          echo "Checking active app source only: $APP_SOURCE"
          if grep -R "Delilah Rescue\|V1.0-G\|prototype\|template\|coming soon" "$APP_SOURCE"; then
            echo "Old contaminated wording found in active app source. Refusing to build."
            exit 1
          fi
          echo "No old contaminated wording found in active app source."

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.9

      - name: Build debug APK
        run: |
          cd "$PROJECT_DIR"
          gradle :app:assembleDebug --stacktrace

      - name: Upload clean APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ToneHarbor-Clean-APK
          path: extracted/**/app/build/outputs/apk/debug/*.apk
